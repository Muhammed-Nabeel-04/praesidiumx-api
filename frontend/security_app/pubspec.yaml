name: security_app 
description: "PraesidiumX"

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  file_picker: ^8.0.0
  fl_chart: ^0.65.0
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.4
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"  


flutter_native_splash:
  color: "#0B1120"
  fullscreen: true

flutter:
  uses-material-design: true
  

  assets:
    - assets/inside_logo.png